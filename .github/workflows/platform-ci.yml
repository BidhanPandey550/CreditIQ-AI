name: Platform CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check app tests migrations
      - run: ruff check app tests migrations
      - run: pytest -q
      - run: alembic upgrade head --sql > /dev/null

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  ml-serving:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ./ai-engine
      - run: pip install -e "./ml-engine[dev]"
      - run: ruff format --check src tests
        working-directory: ml-engine
      - run: ruff check src tests
        working-directory: ml-engine
      - run: pytest -q
        working-directory: ml-engine

  container-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: creditiq-backend:ci
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: creditiq-frontend:ci
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./ml-engine/Dockerfile
          push: false
          tags: creditiq-ml-engine:ci
