name: Platform CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check app tests migrations
      - run: ruff check app tests migrations
      - run: pytest -q
      - run: alembic upgrade head --sql > /dev/null

  postgres-tenant-isolation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: creditiq_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d creditiq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      CREDITIQ_MIGRATION_URL: postgresql+psycopg://postgres:postgres@localhost:5432/creditiq_test
      TEST_ADMIN_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/creditiq_test
      TEST_APP_DATABASE_URL: postgresql+psycopg://creditiq_app:integration-only@localhost:5432/creditiq_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Create non-owner application role
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h localhost -U postgres -d creditiq_test
          -v ON_ERROR_STOP=1
          -c "CREATE ROLE creditiq_app LOGIN PASSWORD 'integration-only' NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT"
      - run: alembic upgrade head
      - name: Grant least-privilege schema access
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h localhost -U postgres -d creditiq_test
          -v ON_ERROR_STOP=1
          -c "GRANT USAGE ON SCHEMA public TO creditiq_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO creditiq_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO creditiq_app"
      - run: pytest -q -m postgres tests/integration/test_tenant_rls.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  ml-serving:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ./ai-engine
      - run: pip install -e "./ml-engine[dev]"
      - run: ruff format --check src tests
        working-directory: ml-engine
      - run: ruff check src tests
        working-directory: ml-engine
      - run: pytest -q
        working-directory: ml-engine

  container-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: creditiq-backend:ci
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: creditiq-frontend:ci
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./ml-engine/Dockerfile
          push: false
          tags: creditiq-ml-engine:ci
