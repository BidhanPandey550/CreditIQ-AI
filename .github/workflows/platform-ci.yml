name: Platform CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engine/**"
      - "ai-engine/**"
      - ".github/workflows/platform-ci.yml"

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check app tests
      - run: ruff check app tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  ml-serving:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ./ai-engine
      - run: pip install -e "./ml-engine[dev]"
      - run: ruff format --check src tests
        working-directory: ml-engine
      - run: ruff check src tests
        working-directory: ml-engine
      - run: pytest -q
        working-directory: ml-engine
